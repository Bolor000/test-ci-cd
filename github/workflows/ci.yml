name: Pull Request CI Check with Bun

on:
  push:
    branches: [main]
  pull_request:
    branches: [ "main", "develop" ]
    types: [ opened, synchronize, reopened ]

jobs:
  ci-check:
    runs-on: ubuntu-latest

    steps:
    # 1. Төслийн кодыг татаж авах
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Bun орчныг суулгах (Албан ёсны action)
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest # Эсвэл яг ашиглаж буй хувилбараа бичиж болно (жнь: 1.1.0)

    # 3. Хамаарлуудыг (Dependencies) суулгах
    # Bun-ий өөрийнх нь кэш маш хурдан тул npm-ээс хамаагүй хурдан суулгана
    - name: Install dependencies
      run: bun install --frozen-lockfile

    # 4. Кодны стандартын шалгалт (Linter)
    # Хэрэв ESLint эсвэл Bun-ий өөрийн linter байгаа бол:
    - name: Run Linter
      run: cd apps/todo/todo-service && bun run lint

    # 5. Автомат тестүүдийг ажиллуулах
    # Хэрэв bun-ий native тест ашигладаг бол `bun test`, эсвэл vitest/jest-ийг `bun test`-ээр ажиллуулж болно
    - name: Run Tests
      run: bun test